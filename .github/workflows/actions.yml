# 이름 짓기
name: Github Actions 연습하기
# 언제 작업을 실행할거니?
# github에 push할 때 실행하겠습니다.
on: push

jobs:
  test:
    # 어떤 환경에서 실행할거니?
    runs-on: ubuntu-latest
    steps:
      - name: Github Repository 불러오기
        uses: actions/checkout@v5

      - name: Node.js 설치하기 (세팅)
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: 의존성 라이브러리 설치하기
        run: npm install

      - name: 테스트 실행하기
        run: npm run test
